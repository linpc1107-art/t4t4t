<svg width="1400" height="800" viewBox="0 0 1400 800" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="800" rx="32" fill="#07111f"/>
  <rect x="40" y="40" width="1320" height="720" rx="28" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <text x="90" y="120" fill="#fbbf24" font-size="38" font-family="Segoe UI, Noto Sans TC, sans-serif" font-weight="700">Prototype 簡介圖</text>
  <text x="90" y="160" fill="#cbd5e1" font-size="22" font-family="Segoe UI, Noto Sans TC, sans-serif">單人闖關射擊原型｜重點在「簡單上手、節奏明確、戰鬥有反饋」</text>

  <rect x="90" y="210" width="300" height="180" rx="24" fill="#111827" stroke="#38bdf8" stroke-width="2"/>
  <circle cx="150" cy="275" r="34" fill="#38bdf8" opacity="0.2"/>
  <text x="150" y="285" font-size="32" text-anchor="middle">🔐</text>
  <text x="220" y="260" fill="#f8fafc" font-size="28" font-family="Segoe UI, Noto Sans TC, sans-serif" font-weight="700">1. 登入與開始</text>
  <text x="220" y="305" fill="#94a3b8" font-size="20" font-family="Segoe UI, Noto Sans TC, sans-serif">玩家進入系統，載入角色與武器</text>
  <text x="220" y="338" fill="#94a3b8" font-size="20" font-family="Segoe UI, Noto Sans TC, sans-serif">快速進入戰鬥流程</text>

  <rect x="430" y="210" width="300" height="180" rx="24" fill="#111827" stroke="#a78bfa" stroke-width="2"/>
  <circle cx="490" cy="275" r="34" fill="#a78bfa" opacity="0.2"/>
  <text x="490" y="285" font-size="32" text-anchor="middle">🎯</text>
  <text x="560" y="260" fill="#f8fafc" font-size="28" font-family="Segoe UI, Noto Sans TC, sans-serif" font-weight="700">2. 選關與戰鬥</text>
  <text x="560" y="305" fill="#94a3b8" font-size="20" font-family="Segoe UI, Noto Sans TC, sans-serif">選擇關卡，進入敵人與 BOSS 戰</text>
  <text x="560" y="338" fill="#94a3b8" font-size="20" font-family="Segoe UI, Noto Sans TC, sans-serif">節奏由小怪、Boss、結算組成</text>

  <rect x="770" y="210" width="300" height="180" rx="24" fill="#111827" stroke="#f97316" stroke-width="2"/>
  <circle cx="830" cy="275" r="34" fill="#f97316" opacity="0.2"/>
  <text x="830" y="285" font-size="32" text-anchor="middle">⚔️</text>
  <text x="900" y="260" fill="#f8fafc" font-size="28" font-family="Segoe UI, Noto Sans TC, sans-serif" font-weight="700">3. 開火與反擊</text>
  <text x="900" y="305" fill="#94a3b8" font-size="20" font-family="Segoe UI, Noto Sans TC, sans-serif">點擊 / 空白鍵開火，怪物會反擊</text>
  <text x="900" y="338" fill="#94a3b8" font-size="20" font-family="Segoe UI, Noto Sans TC, sans-serif">增加爆發感與壓迫感</text>

  <rect x="1110" y="210" width="200" height="180" rx="24" fill="#111827" stroke="#ef4444" stroke-width="2"/>
  <circle cx="1210" cy="275" r="34" fill="#ef4444" opacity="0.2"/>
  <text x="1210" y="285" font-size="32" text-anchor="middle">💥</text>
  <text x="1210" y="260" fill="#f8fafc" font-size="24" font-family="Segoe UI, Noto Sans TC, sans-serif" font-weight="700" text-anchor="middle">4. Boss</text>
  <text x="1210" y="295" fill="#f8fafc" font-size="24" font-family="Segoe UI, Noto Sans TC, sans-serif" font-weight="700" text-anchor="middle">絕招</text>
  <text x="1210" y="330" fill="#94a3b8" font-size="18" font-family="Segoe UI, Noto Sans TC, sans-serif" text-anchor="middle">血量低於 10% 時</text>
  <text x="1210" y="356" fill="#94a3b8" font-size="18" font-family="Segoe UI, Noto Sans TC, sans-serif" text-anchor="middle">隨機暴走</text>

  <path d="M 390 300 L 430 300" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>
  <path d="M 730 300 L 770 300" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>
  <path d="M 1070 300 L 1110 300" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>

  <rect x="90" y="460" width="1220" height="240" rx="28" fill="#111827" stroke="#475569" stroke-width="2"/>
  <text x="130" y="520" fill="#fbbf24" font-size="28" font-family="Segoe UI, Noto Sans TC, sans-serif" font-weight="700">核心目標</text>
  <text x="130" y="565" fill="#e2e8f0" font-size="22" font-family="Segoe UI, Noto Sans TC, sans-serif">• 讓玩家一眼就能懂：點擊、空白鍵、怪物反擊、Boss 絕招</text>
  <text x="130" y="602" fill="#e2e8f0" font-size="22" font-family="Segoe UI, Noto Sans TC, sans-serif">• 讓戰鬥節奏更有高潮：普通攻擊 + 瀕死暴走 + 反饋動畫</text>
  <text x="130" y="639" fill="#e2e8f0" font-size="22" font-family="Segoe UI, Noto Sans TC, sans-serif">• 以簡潔的 UI 與流程，快速驗證「可玩性」與「娛樂性」</text>

  <rect x="1030" y="500" width="240" height="90" rx="18" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="1055" y="540" fill="#fbbf24" font-size="20" font-family="Segoe UI, Noto Sans TC, sans-serif" font-weight="700">可直接拿來展示</text>
  <text x="1055" y="568" fill="#cbd5e1" font-size="18" font-family="Segoe UI, Noto Sans TC, sans-serif">簡單、清楚、好溝通</text>
</svg>
